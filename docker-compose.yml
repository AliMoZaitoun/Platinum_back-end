services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: platinum-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - const-network
    dns:
      - 8.8.8.8
      - 8.8.4.4
  db:
    image: mysql:8.4
    container_name: platinum-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - const-db-data:/var/lib/mysql
    networks:
      - const-network

  nginx:
    image: nginx:alpine
    container_name: const-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - const-network

networks:
  const-network:
    driver: bridge
    name: const-network

volumes:
  const-db-data:
