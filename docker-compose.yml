services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: platinum-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - const-network
    dns:
      - 8.8.8.8
      - 8.8.4.4
  db:
    image: postgres:16-alpine
    container_name: platinum-db
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - const-db-data:/var/lib/postgresql/data
    networks:
      - const-network

  nginx:
    image: nginx:alpine
    container_name: const-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - const-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: platinum-phpmyadmin
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_PORT: 3306

      UPLOAD_LIMIT: 64M
    ports:
      - "8081:80"
    networks:
      - const-network

networks:
  const-network:
    driver: bridge
    name: const-network

volumes:
  const-db-data:
