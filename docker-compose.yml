services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: platinum-app
    ports:
      - "7070:7070"
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - const-network
  db:
    image: postgres:16-alpine
    container_name: platinum-db
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - const-db-data:/var/lib/postgresql/data
    networks:
      - const-network

  nginx:
    image: nginx:alpine
    container_name: const-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - const-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: platinum-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: root
    ports:
      - "8082:80"
    networks:
      - const-network

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - const-network

networks:
  const-network:
    driver: bridge
    name: const-network

volumes:
  const-db-data:
  minio_data:
